<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Маршруты на карте</title>

    <!-- 1. Стили Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- 2. Стили и скрипты плагина для маршрутов -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

    <style>
        #map { height: 500px; width: 100%; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script>
        // Создаем карту
        const map = L.map('map').setView([51.505, -0.09], 6); // Масштаб 6, чтобы видно было оба города

        // Подложка карты (OpenStreetMap)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
        }).addTo(map);

        // Строим маршрут из точки А в точку Б
        L.Routing.control({
            waypoints: [
                L.latLng(51.509, -0.08),  // Лондон
                L.latLng(48.864, 2.349)    // Париж
            ],
            routeWhileDragging: true,      // Пересчитывать маршрут при перетаскивании точек
            showAlternatives: false,       // Показывать альтернативные маршруты
            lineOptions: {
                styles: [{ color: 'blue', weight: 4 }]  // Синяя линия маршрута
            }
        }).addTo(map);
    </script>
</body>
</html>
