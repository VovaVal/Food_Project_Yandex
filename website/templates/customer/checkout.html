{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <h2><i class="bi bi-bag-check"></i> Оформление заказа</h2>

    <div class="row mt-4">
        <div class="col-lg-8">
            <div id="map" style="height: 500px; border-radius: 8px;"></div>
        </div>

        <div class="col-lg-4">
            <div class="card shadow-sm border-0 p-4">
                <h4 class="mb-3">Магазины и расстояния</h4>
                <ul class="list-group" id="shop-list">
                    {% for shop_id, shop_data in grouped_cart.items() %}
                    {% if shop_data.is_active %}
                        <li class="list-group-item d-flex justify-content-between align-items-center"
                            data-lat="{{ shop_data.lat }}"
                            data-lng="{{ shop_data.lng }}"
                            data-radius="{{ shop_data.radius }}"
                            data-shop-id="{{ shop_id }}">
                            <div>
                                <span class="shop-name-text">{{ shop_data.shop_name }}</span>
                                <div class="mt-1 delivery-options" id="delivery-options-{{ shop_id }}">
                                    <label>
                                        <input type="radio" name="delivery-{{ shop_id }}" value="pickup" checked>
                                        Самовывоз
                                    </label>
                                    <label class="ms-3">
                                        <input type="radio" name="delivery-{{ shop_id }}" value="delivery">
                                        Доставка
                                    </label>
                                </div>
                            </div>
                            <span class="badge bg-primary rounded-pill" id="distance-{{ shop_id }}">? км</span>
                        </li>
                    {% endif %}
                    {% endfor %}
                </ul>
            </div>
        </div>
    </div>

    <div class="mt-4 d-flex justify-content-between">
        <a href="{{ url_for('customer.cart_page') }}" class="btn btn-secondary btn-lg">
            <i class="bi bi-arrow-left"></i> Вернуться в корзину
        </a>
        <button id="checkout-btn" class="btn btn-success btn-lg">Подтвердить и перейти к оплате</button>
    </div>
</div>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const userCoords = {% if current_user.coords %}[{{ current_user.coords|replace(',', ',') }}]{% else %}null{% endif %};

const map = L.map('map');
map.attributionControl.remove();
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);

const markers = [];

if (userCoords) {
    const userMarker = L.marker(userCoords, {
        icon: L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/25/25694.png', iconSize: [32,32] })
    }).bindPopup('Ваш дом').addTo(map);
    markers.push(userMarker);
}

const shopItems = document.querySelectorAll('#shop-list li');
shopItems.forEach(item => {
    const lat = parseFloat(item.dataset.lat);
    const lng = parseFloat(item.dataset.lng);
    const shopId = item.dataset.shopId;
    const name = item.querySelector('.shop-name-text').textContent.trim();
    const deliveryRadius = parseFloat(item.dataset.radius) || 3000;

    const marker = L.marker([lat, lng]).bindPopup(name).addTo(map);
    markers.push(marker);

    // Синий круг радиуса доставки
    L.circle([lat, lng], { color: '#0d6efd', fillColor: '#0d6efd', fillOpacity: 0.1, radius: deliveryRadius }).addTo(map);

    // Расстояние до пользователя
    let distance = null;
    if (userCoords) {
        distance = getDistance(userCoords[0], userCoords[1], lat, lng);
        document.getElementById(`distance-${shopId}`).textContent = distance.toFixed(2) + ' км';
    }

    const deliveryDiv = document.getElementById(`delivery-options-${shopId}`);
    if (!userCoords || (distance && distance*1000 > deliveryRadius)) {
        // Пользователь далеко или нет адреса -> только самовывоз
        deliveryDiv.querySelectorAll('input[type="radio"]').forEach(radio => {
            radio.checked = radio.value === 'pickup';
            radio.disabled = true;
        });
    }
});

if (markers.length > 0) {
    const group = L.featureGroup(markers);
    map.fitBounds(group.getBounds().pad(0.2));
}

function getDistance(lat1, lon1, lat2, lon2) {
    const R = 6371;
    const dLat = deg2rad(lat2-lat1);
    const dLon = deg2rad(lon2-lon1);
    const a = Math.sin(dLat/2)**2 + Math.cos(deg2rad(lat1))*Math.cos(deg2rad(lat2))*Math.sin(dLon/2)**2;
    return 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function deg2rad(deg) { return deg * (Math.PI/180); }
</script>

<script>
document.getElementById('checkout-btn').addEventListener('click', () => {
    const deliveryData = {};
    document.querySelectorAll('.delivery-options').forEach(div => {
        const shopId = div.id.split('-')[2]; // delivery-options-<shop_id>
        const selected = div.querySelector('input[type="radio"]:checked');
        if (selected) {
            deliveryData[shopId] = selected.value;
        }
    });

    fetch('{{ url_for("customer.final_checkout") }}', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(deliveryData)
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            window.location.href = data.redirect_url;
        } else {
            alert(data.message || 'Ошибка при оформлении заказа');
        }
    });
});
</script>
{% endblock %}
