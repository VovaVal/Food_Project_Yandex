{% extends "base.html" %}

{% block content %}
<a href="{{ url_for('customer.dashboard') }}" class="btn btn-primary">На главную страницу</a>
<h1>Настройки</h1>
<h3>Аватар:  <img src="https://{{ config['BUCKET_CLIENT'] }}.s3.cloud.ru/{{ current_user.img }}" alt="Изображение аватара"></h3>

<h3>Имя пользователя: {{ current_user.name }}</h3>
<h3>Почта: {{ current_user.email }}</h3>
<h3>Адрес проживания: {{ current_user.address or 'Не указан' }}</h3>
<h3>Бонусов: {{ current_user.user_bonuses }}</h3>

<a href="{{ url_for('customer.edit_settings') }}" class="btn btn-primary">Редактировать</a>

{% endblock %}
