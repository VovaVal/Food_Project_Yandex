<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Маршруты: автомобиль, пешком, велосипед</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

    <style>
        #map { height: 500px; width: 100%; }
        .mode-selector {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1000;
            background: white;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }
        .mode-selector button {
            margin: 0 5px;
            padding: 5px 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <div class="mode-selector">
        <span>🚗</span>
        <button onclick="setRouteMode('car')">Авто</button>
        <button onclick="setRouteMode('foot')">🚶 Пешком</button>
        <button onclick="setRouteMode('bike')">🚲 Вело</button>
    </div>

    <script>
        const map = L.map('map').setView([55.751, 37.618], 12);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        let routingControl = null;

        // Точки маршрута (Москва: Кремль -> Лужники)
        const startPoint = L.latLng(55.751244, 37.618423);
        const endPoint = L.latLng(55.719, 37.556);

        function setRouteMode(profile) {
            // Удаляем старый маршрут
            if (routingControl) {
                map.removeControl(routingControl);
            }

            // Выбираем OSRM сервер в зависимости от профиля
            let osrmServer;
            switch(profile) {
                case 'foot':
                    osrmServer = 'https://routing.openstreetmap.de/routed-foot/route/v1/';
                    break;
                case 'bike':
                    osrmServer = 'https://routing.openstreetmap.de/routed-bike/route/v1/';
                    break;
                default:
                    osrmServer = 'https://routing.openstreetmap.de/routed-car/route/v1/';
                    profile = 'driving';
            }

            // Создаём новый маршрут с нужным профилем
            routingControl = L.Routing.control({
                waypoints: [startPoint, endPoint],
                router: L.Routing.osrmv1({
                    serviceUrl: osrmServer,
                    profile: profile
                }),
                routeWhileDragging: true,
                showAlternatives: false,
                lineOptions: {
                    styles: [{ color: getRouteColor(profile), weight: 5 }]
                }
            }).addTo(map);
        }

        function getRouteColor(profile) {
            switch(profile) {
                case 'foot': return 'green';
                case 'bike': return 'orange';
                default: return 'blue';
            }
        }

        // Стартуем с автомобильного маршрута
        setRouteMode('car');
    </script>
</body>
</html>
